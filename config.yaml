project:
  name: "Insider Threat Detection System"
  version: "1.0.0"
  description: "Enterprise-grade UEBA using unsupervised ML"

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  models: "data/models"
  logs: "logs"
  reports: "reports"

data:
  cert_version: "r4.2"
  # CSV filenames expected inside data/raw/
  files:
    logon: "logon.csv"
    file: "file.csv"
    device: "device.csv"
    email: "email.csv"
    ldap: "LDAP.csv"
    psychometric: "psychometric.csv"
  # Date range for the CERT r4.2 dataset
  start_date: "2010-01-02"
  end_date: "2011-12-16"
  business_hours:
    start: 8
    end: 18

features:
  window_days: 1          # aggregate per user per day
  rolling_baseline: 7     # 7-day rolling mean for deviation features
  features_list:
    - login_hour_mean
    - login_hour_std
    - session_duration_total
    - sessions_per_day
    - files_accessed_count
    - files_outside_hours
    - usb_usage_count
    - usb_data_volume_mb
    - emails_sent
    - emails_to_external
    - email_attachment_count
    - after_hours_activity_ratio
    - confidential_access_count
    - unique_pcs_used
    - dept_deviation_score

models:
  isolation_forest:
    n_estimators: 200
    contamination: 0.05
    max_samples: "auto"
    random_state: 42
    n_jobs: -1

  autoencoder:
    encoding_layers: [32, 16, 8]
    decoding_layers: [16, 32]
    activation: "relu"
    dropout_rate: 0.2
    epochs: 50
    batch_size: 64
    learning_rate: 0.001
    validation_split: 0.15

scoring:
  weights:
    isolation_forest: 0.6
    autoencoder: 0.4
  thresholds:
    low: 40
    medium: 70
    high: 85
    critical: 95
  risk_labels:
    - NORMAL
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL

# api:
#   host: "0.0.0.0"
#   port: 5000
#   debug: false
  
api:
  host: 0.0.0.0
  port: 5000
  debug: true
  

alerts:
  email_enabled: false
  slack_enabled: false
  auto_block_critical: false
  retention_days: 90
